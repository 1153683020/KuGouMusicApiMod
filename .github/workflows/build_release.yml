name: Multi-Branch Build and Release

on:
  push:
    tags:
      - 'v*'               # 推送 v1.0.0, v1.2.3 等标签时触发

jobs:
  build-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 允许创建 Release 并上传附件

    steps:
      - name: Checkout repository (default branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 必须，以便拉取所有分支历史

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 提取模组版本号（从标签）
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}   # 去掉 v 前缀，如 v1.0.0 → 1.0.0
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 批量构建并收集 Jar
        id: build-branches
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # ========== 在这里修改你需要构建的分支列表 ==========
          BRANCHES=("1.21-Fabric" "1.21.1-Fabric" "1.21.11-Fabric")
          # ===================================================

          mkdir -p release-artifacts
          echo "构建分支列表: ${BRANCHES[@]}"

          for branch in "${BRANCHES[@]}"; do
            echo "========================================"
            echo "正在构建分支: $branch"

            # 切换到此分支（detached HEAD）
            git fetch origin "$branch"
            git checkout "origin/$branch" || { echo "⚠️ 切换分支 $branch 失败，跳过"; continue; }

            # 确保 gradlew 可执行（每个分支都要有自己的 gradlew）
            chmod +x ./gradlew || { echo "⚠️ 该分支没有 gradlew，跳过"; continue; }

            # 提取模组加载器类型（取 '-' 后面的部分，转小写）
            LOADER=$(echo "$branch" | awk -F '-' '{print tolower($NF)}')

            # 提取游戏版本（去掉最后一个 '-' 及之后的内容）
            GAME_VERSION=$(echo "$branch" | sed 's/-[^-]*$//')

            # 执行构建（跳过测试以加快速度，可移除 -x test 以保留测试）
            ./gradlew clean build -x test

            # 查找生成的 Jar（排除 sources 和 dev 包）
            JAR_PATH=$(find build/libs -name "*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" | head -1)

            if [ -z "$JAR_PATH" ]; then
              echo "⚠️ 未找到 Jar 文件，跳过 $branch"
              continue
            fi

            # 重命名：模组名-游戏版本-加载器-模组版本.jar
            NEW_NAME="KugouMusicApimod-${GAME_VERSION}-${LOADER}-${VERSION}.jar"
            cp "$JAR_PATH" "release-artifacts/$NEW_NAME"
            echo "✅ 已生成: $NEW_NAME"

            # 清理当前构建，准备下一个分支
            ./gradlew clean
            git clean -fdx
          done

      - name: 列出所有收集到的 Jar
        run: ls -lh release-artifacts/

      - name: 发布到 Release
        uses: softprops/action-gh-release@v2   # v2 消除了 Node.js 警告
        with:
          files: release-artifacts/*
          body: |
            ## 多分支自动构建版本 v${{ steps.version.outputs.version }}

            本次发布包含以下模组加载器版本：
            - Fabric
            - Forge
            - NeoForge

            触发提交: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}