name: Multi-Branch Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository (default branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 必须，为了拉取所有分支历史

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: 提取版本号（从标签）
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}   # 去除 v 前缀
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 批量构建并收集 Jar
        id: build-branches
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # 这里改成你要构建的分支列表（按需修改）
          BRANCHES=("1.21-Fabric" "1.21.1-Fabric" "1.21.11-Fabric")
          
          mkdir -p release-artifacts
          echo "构建分支列表: ${BRANCHES[@]}"

          for branch in "${BRANCHES[@]}"; do
            echo "========================================"
            echo "正在构建分支: $branch"
            
            # 切换到目标分支（detached HEAD）
            git fetch origin "$branch"
            git checkout "origin/$branch" || { echo "切换分支 $branch 失败，跳过"; continue; }
            
            # 提取加载器类型（取 '-' 后面部分，转小写）
            LOADER=$(echo "$branch" | awk -F '-' '{print tolower($NF)}')
            
            # 执行构建（跳过测试以加快速度，可去掉 -x test）
            ./gradlew clean build -x test
            
            # 查找 Jar 文件（排除 sources 和 dev 包）
            JAR_PATH=$(find build/libs -name "*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" | head -1)
            
            if [ -z "$JAR_PATH" ]; then
              echo "⚠️ 未找到 Jar 文件，跳过 $branch"
              continue
            fi
            
            # 重命名并复制到收集目录
            NEW_NAME="kugoumusicapimod-${VERSION}-${LOADER}.jar"
            cp "$JAR_PATH" "release-artifacts/$NEW_NAME"
            echo "✅ 已生成: $NEW_NAME"
            
            # 清理当前构建残留，准备下一个分支
            ./gradlew clean
            git clean -fdx
          done

      - name: 列出所有收集到的 Jar
        run: ls -lh release-artifacts/

      - name: 发布到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/*
          body: |
            ## 多分支自动构建版本 v${{ steps.version.outputs.version }}
            
            本次发布包含以下模组加载器版本：
            - Fabric
            - Forge(不存在，后续移植)
            - NeoForge（同上）
            
            触发提交: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
